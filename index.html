  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing work projects</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#162d8f,#6a11cb);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:430px;
      background:#fff;
      border-radius:35px;
      border:5px solid #f1b91c;
      padding:30px 22px;
      position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,0.25);
      overflow:hidden;
    }

    .verified-badge{
      position:absolute;
      top:18px;
      right:18px;
      background:#2563eb;
      color:#fff;
      padding:10px 18px;
      border-radius:50px;
      font-size:12px;
      font-weight:700;
      letter-spacing:1px;
      box-shadow:0 8px 20px rgba(37,99,235,0.3);
    }

    .logo-box{
      width:95px;
      height:95px;
      border-radius:50%;
      border:3px solid #e5b81f;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:25px auto 18px;
      overflow:hidden;
      background:#fffdf5;
    }

    .logo-box img{
      width:60px;
      height:60px;
      object-fit:contain;
    }

    .company-name{
      text-align:center;
      font-family:'Dancing Script',cursive;
      color:#1e40af;
      font-size:42px;
      font-weight:700;
      line-height:1;
    }

    .company-sub{
      text-align:center;
      color:#444;
      letter-spacing:2px;
      font-size:11px;
      margin-top:8px;
      font-weight:600;
    }

    .main-heading{
      text-align:center;
      margin-top:38px;
      line-height:1.25;
      font-size:30px;
      font-weight:800;
      color:#111827;
    }

    .main-heading span{
      color:#2563eb;
      display:block;
    }

    .feature-box{
      margin-top:32px;
      background:#eef2f7;
      border-radius:22px;
      padding:24px 20px;
      border:1px solid #dbe4ef;
    }

    .feature{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:20px;
      color:#374151;
      font-size:18px;
      font-weight:600;
    }

    .feature:last-child{
      margin-bottom:0;
    }

    .check{
      color:#22c55e;
      font-size:26px;
      font-weight:700;
    }

    .telegram-btn-wrap{
      margin-top:28px;
      background:#dcecf7;
      border-radius:28px;
      padding:14px;
    }

    .telegram-btn{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      background:linear-gradient(135deg,#0ea5e9,#0284c7);
      color:#fff;
      padding:22px 20px;
      border-radius:22px;
      font-size:20px;
      font-weight:800;
      transition:0.3s ease;
      box-shadow:0 12px 30px rgba(2,132,199,0.35);
    }

    .telegram-btn:hover{
      transform:translateY(-3px);
    }

    .slots{
      margin-top:18px;
      text-align:center;
      color:#dc2626;
      font-weight:700;
      font-size:16px;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      0%{opacity:1;}
      50%{opacity:0.5;}
      100%{opacity:1;}
    }

    .dot{
      font-size:24px;
      vertical-align:middle;
    }

    .footer{
      margin-top:40px;
      text-align:center;
      color:#9ca3af;
      font-size:12px;
      letter-spacing:3px;
      border-top:1px solid #f1f5f9;
      padding-top:22px;
      font-weight:600;
    }

    @media(max-width:480px){
      .card{
        padding:24px 18px;
        border-radius:28px;
      }

      .company-name{
        font-size:34px;
      }

      .main-heading{
        font-size:24px;
      }

      .feature{
        font-size:16px;
      }

      .telegram-btn{
        font-size:18px;
        padding:18px;
      }

      .verified-badge{
        font-size:10px;
        padding:8px 14px;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="verified-badge">VERIFIED COMPANY</div>

    <div class="logo-box">
      <img src="https://telegram-ads.riyazshaikh.com/wp-content/uploads/2026/05/images.png" alt="Logo">
    </div>

    <h2 class="company-name">Handwriting Work </h2>
    <p class="company-sub">PRIVATE LIMITED</p>

    <h1 class="main-heading">
      WORK FROM HOME
      <span>HANDWRITING</span>
      <span>PROJECTS</span>
    </h1>

    <div class="feature-box">

      <div class="feature">
        <div class="check">✓</div>
        <div>No Experience Required</div>
      </div>

      <div class="feature">
        <div class="check">✓</div>
        <div>Daily Payouts (Bank/UPI)</div>
      </div>

      <div class="feature">
        <div class="check">✓</div>
        <div>Simple Assignment Copy Work</div>
      </div>

    </div>

    <div class="telegram-btn-wrap">
      <a class="telegram-btn" href="https://t.me/+AKijnv5TV09kODE1" target="_blank">
        JOIN TELEGRAM NOW
      </a>
    </div>

    <div class="slots">
      <span class="dot">●</span>
      ONLY 7 SLOTS LEFT FOR TODAY!
    </div>

    <div class="footer">
      © 2026 SCRIPT GLOBAL ELITE PRIVATE LIMITED
    </div>

  </div>

</body>
</html>
